          "@type": "Question",
          "name": "How can UK public sector organisations procure Tesseract Academy services?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tesseract Academy is an appointed supplier on three Crown Commercial Service frameworks: the Artificial Intelligence Dynamic Purchasing System (RM6200), Spark DPS (RM6094), and Research & Insights DPS (RM6126). Public bodies can commission services through these frameworks or via direct award for contracts under threshold."
          }
        },
        {
          "@type": "Question",
          "name": "What services does Tesseract Academy provide to the public sector?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tesseract Academy delivers six core service areas: AI and data science consulting, research and policy advisory, public engagement and participatory research, education and AI upskilling, survey design and delivery, and AI ethics and governance. Recent contracts include Welsh Government land valuation research, Innovate UK BridgeAI creative industries AI training, National Digital Twin Programme ontology tools, and Qualifications Wales national qualifications monitoring."
          }
        },
        {
          "@type": "Question",
          "name": "What government contracts has Tesseract Academy delivered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Recent public sector contracts include: Welsh Government commissioned research testing five land valuation methodologies (published March 2026); BridgeAI/Innovate UK AI training for creative industries (contract GSS24646); National Digital Twin Programme AI ontology extension tool (Department for Business and Trade); Qualifications Wales subject expert services for monitoring national qualifications (2026-2029); Aberdeenshire Council Expert Help for Business framework (Lot 1 - Financial Management, March 2026); and Kalgera/Fintech Scotland financial vulnerability research."
          }
        },
        {
          "@type": "Question",
          "name": "Is Tesseract Academy Cyber Essentials certified?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Tesseract Academy (Kampakis and Co Ltd, company number 10459791) holds Cyber Essentials certification and is ISO 27001 aligned. The company also holds public liability insurance of 2 million pounds, employer liability of 10 million pounds, and professional indemnity of 5 million pounds."
          }
        },
        {
          "@type": "Question",
          "name": "Does Tesseract Academy support Innovate UK and Horizon Europe consortium bids?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Tesseract Academy actively partners with universities, SMEs, and NGOs on Innovate UK and Horizon Europe funding bids. Current focus areas include trustworthy AI and safety, digital twins for urban planning, HealthTech interoperability, and sustainable technology. The company holds a Participant Identification Code (PIC: 880269472) for EU funding applications."
          }
        }
      ]
